<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Server Upgrade | Please Wait</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f1f5f9;
overflow:hidden;
color:#0f172a;
}

/* animated gradient background */

.bg{
position:absolute;
width:200%;
height:200%;
background:linear-gradient(120deg,#6366f1,#22c55e,#06b6d4,#6366f1);
background-size:400% 400%;
animation:gradient 15s ease infinite;
opacity:.15;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* floating particles */

.particle{
position:absolute;
width:6px;
height:6px;
background:#6366f1;
border-radius:50%;
opacity:.3;
animation:float 10s infinite linear;
}

@keyframes float{
from{
transform:translateY(0);
}
to{
transform:translateY(-120vh);
}
}

/* glass card */

.card{
position:relative;
width:90%;
max-width:650px;
padding:50px;
border-radius:28px;
background:rgba(255,255,255,0.65);
backdrop-filter:blur(25px);
box-shadow:0 30px 90px rgba(0,0,0,0.12);
text-align:center;
animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:24px;
font-weight:600;
margin-bottom:15px;
}

.status{
display:inline-flex;
align-items:center;
gap:8px;
background:#ecfeff;
color:#0891b2;
padding:6px 12px;
border-radius:20px;
font-size:13px;
margin-bottom:20px;
}

.dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1}
50%{opacity:.4}
100%{opacity:1}
}

h1{
font-size:36px;
margin-bottom:12px;
}

.desc{
color:#475569;
margin-bottom:30px;
line-height:1.6;
}

/* server load bar */

.progress{
height:10px;
background:#e2e8f0;
border-radius:30px;
overflow:hidden;
margin-bottom:35px;
}

.bar{
height:100%;
width:55%;
background:linear-gradient(90deg,#6366f1,#22c55e);
animation:load 5s infinite ease-in-out;
}

@keyframes load{
0%{width:45%}
50%{width:85%}
100%{width:60%}
}

/* countdown */

.countdown{
display:flex;
justify-content:center;
gap:18px;
margin-bottom:30px;
flex-wrap:wrap;
}

.time{
background:white;
padding:16px;
border-radius:14px;
min-width:70px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

.time span{
font-size:24px;
font-weight:600;
display:block;
}

.time small{
font-size:11px;
color:#64748b;
}

/* button */

.btn{
display:inline-block;
padding:14px 32px;
border-radius:30px;
background:#6366f1;
color:white;
text-decoration:none;
font-weight:500;
transition:.3s;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

/* footer */

.footer{
margin-top:25px;
font-size:13px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="bg"></div>

<script>

/* create particles */

for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*100+"vh";

p.style.animationDuration=5+Math.random()*10+"s";

document.body.appendChild(p);

}

</script>

<div class="card">

<div class="logo">YourCompany</div>

<div class="status">
<div class="dot"></div>
Server Scaling
</div>

<h1>Server Capacity Reached</h1>

<p class="desc">
Due to extremely high demand, our platform is currently operating
at full capacity. Our engineering team is expanding the server
infrastructure to provide a faster and more stable experience.
</p>

<div class="progress">
<div class="bar"></div>
</div>

<div class="countdown">

<div class="time">
<span id="d">0</span>
<small>DAYS</small>
</div>

<div class="time">
<span id="h">0</span>
<small>HOURS</small>
</div>

<div class="time">
<span id="m">0</span>
<small>MIN</small>
</div>

<div class="time">
<span id="s">0</span>
<small>SEC</small>
</div>

</div>

<a href="https://www.google.com/?hl=ID" class="btn">Contact Support</a>



</div>

<script>

const target = new Date("Apr 10, 2026 12:00:00").getTime();

setInterval(()=>{

const now=new Date().getTime();

const diff=target-now;

const d=Math.floor(diff/(1000*60*60*24));
const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((diff%(1000*60*60))/(1000*60));
const s=Math.floor((diff%(1000*60))/1000);

document.getElementById("d").innerHTML=d;
document.getElementById("h").innerHTML=h;
document.getElementById("m").innerHTML=m;
document.getElementById("s").innerHTML=s;

},1000);

</script>

</body>
</html>
